services:
  - type: web
    name: bankassist-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_PORT
        value: 10000
      - key: DATA_DIR
        value: /data/banking_knowledge
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_db
      - key: SESSIONS_DIR
        value: /data/sessions
      - key: METADATA_PATH
        value: /data/documents_metadata.json
    healthCheckPath: /api/health
    disk:
      name: bankassist-data
      mountPath: /data
      sizeGB: 1
